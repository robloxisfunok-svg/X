<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#191b1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Main Wallet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="stage">
  <section class="phone" aria-label="Main Wallet">
    <header class="statusbar"><strong>10:49</strong><span>SOS&nbsp;&nbsp;◒&nbsp;&nbsp;<b>36</b></span></header>
    <div class="topbar">
      <button class="wallet-pill" type="button"><span class="wallet-icon">▭</span><span>Main Wallet</span></button>
      <button class="round" type="button">↶</button><button class="round scan" type="button">⌗</button>
    </div>
    <div class="promo"><span class="promo-logo">↗</span><div><b>0% swap fees on Robinhood C…</b><small>Applies to all Robinhood Chain swaps,…</small></div><button id="closePromo">×</button></div>

    <section class="balance"><h1 id="totalBalance">$1.48</h1><div class="gain">▲ &nbsp;$0.0100 (0.90%)</div></section>
    <div class="actions"><button><span>↗</span>Send</button><button><span>↓</span>Receive</button><button class="swap"><span>⟳</span>Swap</button><button><span>＋</span>Buy</button></div>

    <div class="section-title">Tokens <span>›</span></div>
    <section id="tokenList" class="token-list" aria-live="polite"></section>

    <nav class="bottom-nav"><button class="active">⌂</button><button>↗</button><button>∞</button><button>◉</button></nav><button class="search">⌕</button>
    <div class="home-indicator"></div>
  </section>
</main>

<div class="modal-backdrop" id="editor" hidden>
  <section class="modal" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
    <button class="modal-close" id="cancelEdit" aria-label="Close">×</button>
    <img id="editorLogo" alt="">
    <h2 id="editorTitle">Edit Solana</h2>
    <div class="tabs"><button id="coinMode" class="selected" type="button">Crypto amount</button><button id="usdMode" type="button">USD value</button></div>
    <label id="amountLabel" for="amountInput">SOL amount</label>
    <input id="amountInput" type="number" inputmode="decimal" min="0" step="any" placeholder="0">
    <p id="conversionPreview">≈ $0.00</p>
    <button class="save" id="saveEdit" type="button">Save</button>
  </section>
</div>
<script src="script.js"></script>
</body>
</html>
